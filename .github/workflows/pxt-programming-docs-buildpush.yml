name: pxt-buildpush

on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  pull_request:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  filter-vtags:
    uses: ./.github/workflows/is-vtag.yml

  tag-bump-commit:
    uses: ./.github/workflows/tag-bump-commit.yml
    needs: filter-vtags
    # Run only when NOT a vtag
    if: needs.filter-vtags.outputs.is_vtag != 'true'

  buildpush:
    name: buildpush
    runs-on: ubuntu-latest
    needs: tag-bump-commit
    # Run only when tag-bump-commit did NOT create a tag
    if: always() && needs.tag-bump-commit.outputs.did_tag != 'true'
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Use Node.js
        uses: actions/setup-node@main
        with:
          node-version: 20.x

      - name: Update npm
        run: npm install -g npm@latest

      - name: npm install
        run: |
          sudo apt-get install xvfb
          sudo npm install -g pxt
          npm install

      - name: pxt ci (without publish capability)
        run: pxt ci
        env:
          CHROME_BIN: chromium-browser
          DISPLAY: :99.0
          CI: true

  buildvtag:
    name: buildvtag
    runs-on: ubuntu-latest
    needs: tag-bump-commit
    # Run only when tag-bump-commit DID create a tag
    if: always() && needs.tag-bump-commit.outputs.did_tag == 'true'
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Use Node.js
        uses: actions/setup-node@main
        with:
          node-version: 20.x

      - name: Update npm
        run: npm install -g npm@latest

      - name: npm install
        run: |
          sudo apt-get install xvfb
          sudo npm install -g pxt
          npm install

      - name: Checkout pxt-arcade-sim
        uses: actions/checkout@v5
        with:
          repository: microsoft/pxt-arcade-sim
          ref: v0.12.3
          ssh-key: ${{ secrets.SIM_DEPLOY_KEY }}
          path: node_modules/pxt-arcade-sim

      - name: pxt ci (with publish capability)
        run: pxt ci --publish
        env:
          NPM_PUBLISH: true
          CHROME_BIN: chromium-browser
          DISPLAY: :99.0
          CI: true
