name: pxt-buildpush

on:
  push:
    branches:
      - '**' # Run workflow when any branch is updated
    tags:
      - '*'  # Run workflow when any new tag is pushed
  pull_request:
    branches:
      - '**' # Run workflow for pull requests targeting any branch

permissions:
  contents: write
  id-token: write  # Required for OIDC

jobs:
  filter-vtags:
    uses: ./.github/workflows/is-vtag.yml

  tag-bump-commit:
    uses: ./.github/workflows/tag-bump-commit.yml
    needs: filter-vtags
    is_vtag: ${{ steps.check.outputs.is_vtag }}

  buildpush:
    name: buildpush
    runs-on: ubuntu-latest
    needs: tag-bump-commit
    if: always() && fromJSON(needs.tag-bump-commit.outputs.did_tag || 'false') == false
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Use Node.js
        uses: actions/setup-node@main
        with:
          node-version: 20.x

      - name: Update npm
        run: npm install -g npm@latest

      - name: npm install
        run: |
          sudo apt-get install xvfb
          sudo npm install -g pxt
          npm install

  buildvtag:
    name: buildvtag
    runs-on: ubuntu-latest
    needs: tag-bump-commit
    if: always() && fromJSON(needs.tag-bump-commit.outputs.did_tag || 'false') == true
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Use Node.js
        uses: actions/setup-node@main
        with:
          node-version: 20.x

      - name: Update npm
        run: npm install -g npm@latest

      - name: npm install
        run: |
          sudo apt-get install xvfb
          sudo npm install -g pxt
          npm install
