name: AI Bot Investigation
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  inspect-without-ai:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Ensure Labels Exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: "DeveloperTryingToCodeLikeOtherOfThem/pxt-hardware-programming-docs"
        run: |
          # 2026 FIX: Force-create the labels so the 'gh issue' command doesn't crash
          gh label create "neutralized" --color "0E8A16" --description "Target is 404/Offline" --repo "$REPO" --force || true
          gh label create "threat-detected" --color "D93F0B" --description "Malicious script found" --repo "$REPO" --force || true
          gh label create "monitored" --color "FBCA04" --description "Site is up but clean" --repo "$REPO" --force || true

      - name: Forensic Web Grab
        id: grab
        run: |
          TARGET="https://enablesmartspirit.blogspot.com/"
          # Use curl -f to fail on 404/500 errors. 
          # Use -A to set a User-Agent so the Blogger bots don't block the runner.
          curl -s -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" "$TARGET" > site_source.txt || echo "OFFLINE" > site_source.txt
          
          # Detect the Hacker's AGC CSR script signatures
          if grep -q "OFFLINE" site_source.txt; then
            echo "RESULT=404" >> $GITHUB_ENV
          elif grep -q -E "AGC CSR|agc-csr|notice-detected" site_source.txt; then
            echo "RESULT=DETECTED" >> $GITHUB_ENV
          else
            echo "RESULT=CLEAN" >> $GITHUB_ENV
          fi

      - name: Log Findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: "DeveloperTryingToCodeLikeOtherOfThem/workflow-testing"
        run: |
          if [[ "$RESULT" == "404" ]]; then
            gh issue create --repo "$REPO" \
              --title "🎉 Node Neutralized" \
              --body "Target site is 404 or Offline. The hacker node has been dropped." \
              --label "neutralized"
          elif [[ "$RESULT" == "DETECTED" ]]; then
            gh issue create --repo "$REPO" \
              --title "⚠️ Warning: AGC CSR Detected" \
              --body "THE MALICIOUS SCRIPT IS LIVE. Signatures for 'AGC CSR' found in site source." \
              --label "threat-detected"
          else
            gh issue create --repo "$REPO" \
              --title "🔍 Scan Clean" \
              --body "The site is reachable, but the specific 'AGC CSR' spam signatures were not found." \
              --label "monitored"
          fi
