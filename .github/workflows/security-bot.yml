name: AI Bot Investigation
on:
  schedule:
    - cron: '0 */12 * * *' # Twice daily
  workflow_dispatch:      # Manual trigger

jobs:
  ai-inspect:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Install 2026 Copilot CLI
        run: npm install -g @github/copilot
          
      - name: One-Shot Forensic Scan
        id: scanner
        env:
          # In 2026, the CLI prioritizes this specific variable name
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          TARGET="https://enablesmartspirit.blogspot.com/"
          
          # 2026 STRICT ONE-SHOT SYNTAX:
          # --one-shot: Essential for Free Tier automation.
          # --allow-tools: Gives the AI 'Search Warrant' for the URL.
          # -p: The prompt text.
          
          REPORT=$(copilot --one-shot --allow-tools -p "Check if $TARGET exists. If yes, find 'AGC CSR' version. If 404, say '404'. Be extremely brief.")
          
          echo "REPORT_DATA<<EOF" >> $GITHUB_ENV
          echo "$REPORT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Log Findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$REPORT_DATA" == *"404"* ]]; then
            gh issue create --title "🎉 Hooray: Bot Node Neutralized" \
              --body "The tracker confirms the site is dead." --label "neutralized"
          else
            gh issue create --title "⚠️ Warning: Bot Node Active" \
              --body "Forensic Data: $REPORT_DATA" --label "threat-detected"
          fi
