name: AI Bot Investigation
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  ai-inspect:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Manual Source Grab
        id: grabber
        run: |
          # Use curl to get the site source. If it's a 404, this will catch it.
          TARGET="https://enablesmartspirit.blogspot.com/"
          curl -s -L "$TARGET" > site_source.txt || echo "OFFLINE" > site_source.txt
          
          # Check if the file is empty or 404
          if [[ ! -s site_source.txt ]]; then echo "STATUS=404" >> $GITHUB_ENV; fi

      - name: Copilot Forensic Analysis
        if: env.STATUS != '404'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          # We PIPE the text into copilot so it doesn't have to 'search'
          # This uses 0 'Premium Requests' because it's local analysis
          REPORT=$(cat site_source.txt | copilot -p "Look at this HTML code. Is the 'AGC CSR' script here? What version? Respond in 1 sentence.")
          
          echo "REPORT_DATA<<EOF" >> $GITHUB_ENV
          echo "$REPORT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Log Findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$STATUS" == "404" ]]; then
            gh issue create --title "🎉 Hooray: Node Neutralized" --body "Site is dead." --label "neutralized"
          else
            gh issue create --title "⚠️ Warning: Node Active" --body "Analysis: $REPORT_DATA" --label "threat-detected"
          fi
