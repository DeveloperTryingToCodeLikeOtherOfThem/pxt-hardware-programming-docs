name: AI Bot Investigation
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  ai-inspect:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Install Copilot CLI
        run: npm install -g @github/copilot
          
      - name: Copilot Forensic Scan
        id: scanner
        env:
          # Use your specific Secret
          COPILOT_GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TARGET="https://enablesmartspirit.blogspot.com/"
          
          # 2026 Non-Interactive Logic
          # We force the token inline and use --yes to bypass prompts
          REPORT=$(COPILOT_GITHUB_TOKEN="${{ secrets.COPILOT_TOKEN }}" copilot -p "Analyze $TARGET. Is 'AGC CSR' present? If 404, respond ONLY with '404'." --allow-all-tools --yes)
          
          echo "REPORT_DATA<<EOF" >> $GITHUB_ENV
          echo "$REPORT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Log Findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Providing the full path to your private repo
          TARGET_REPO: "DeveloperTryingToCodeLikeOtherOfThem/workflow-testing"
        run: |
          if [[ "$REPORT_DATA" == *"404"* ]]; then
            gh issue create --repo "$TARGET_REPO" \
              --title "🎉 Hooray: Node Neutralized" \
              --body "The link is dead. Investigation complete." \
              --label "neutralized"
          else
            gh issue create --repo "$TARGET_REPO" \
              --title "⚠️ Warning: Node Active" \
              --body "### Analysis Results\n$REPORT_DATA" \
              --label "threat-detected"
          fi
