jobs:
  activation:
    if: github.event.label.name == 'ai-triage'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      comment_id: ""
      comment_repo: ""
    steps:
      - name: Setup Scripts
        uses: github/gh-aw/actions/setup@faa1930e4aa3a4cdc067380eef33c281e0eeb646 # v0.43.10
        with:
          destination: /opt/gh-aw/actions
      - name: Check workflow file timestamps
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          GH_AW_WORKFLOW_FILE: "triage.lock.yml"
        with:
          script: |
            const { setupGlobals } = require('/opt/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io);
            const { main } = require('/opt/gh-aw/actions/check_workflow_timestamp_api.cjs');
            await main();

  agent:
    needs: activation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Gather issue context and generate summary
        id: analyze
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue || {};
            const title = issue.title || "(no title)";
            const body = issue.body || "(no body)";

            // Lightweight, deterministic "analysis" that you can replace with real AI later.
            // Create a short excerpt and a simple checklist of things to check.
            const excerpt = body.split("\n").slice(0, 10).join("\n").slice(0, 1200);
            const lines = [];
            lines.push("**Recommendation for Triage**");
            lines.push("");
            lines.push(`**Title:** ${title}`);
            lines.push("");
            lines.push("**Excerpt:**");
            lines.push(excerpt || "(empty)");
            lines.push("");
            lines.push("**Quick checks:**");
            lines.push("- Has reproduction steps? " + (body.match(/(steps to reproduce|repro|reproduce)/i) ? "Yes" : "No"));
            lines.push("- Mentions hardware or board? " + (body.match(/(board|hardware|pin|gpio|i2c|spi|uart)/i) ? "Yes" : "No"));
            lines.push("- Looks like a bug report or feature request? " + (body.length > 200 ? "Likely bug/long report" : "Short / unclear"));
            lines.push("");
            lines.push("*This comment was generated automatically by the repository triage workflow.*");

            const summary = lines.join("\n");
            core.setOutput("summary", summary);

            // const { setupGlobals } = require('/opt/gh-aw/actions/setup_globals.cjs');
            // setupGlobals(core, github, context, exec, io);
            // const { main } = require('/opt/gh-aw/actions/merge_remote_agent_github_folder.cjs');
            // await main();

      - name: Post triage comment
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ steps.analyze.outputs.summary }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });

      - name: Add triaged label
        uses: actions/github-script@v7
        with:
          script: |
            // Add a label to mark this issue as triaged. If the label doesn't exist, this call will still succeed.
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['triaged']
            });

      - name: Final status comment (noop if already commented)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            // Add a short final note so it's obvious the workflow completed.
            const final = ""
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: final
            });
