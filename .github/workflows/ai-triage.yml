name: Triage

on:
  issues:
    types:
      - labeled

# Prevent concurrent runs for the same issue
concurrency:
  group: "triage-${{ github.workflow }}-${{ github.event.issue.number }}"
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

run-name: "Triage"

jobs:
  activation:
    # Only run when the label added is exactly 'ai-triage'
    if: github.event.label.name == 'ai-triage'
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.set-outputs.outputs.issue_number }}
      repo_owner: ${{ steps.set-outputs.outputs.repo_owner }}
      repo_name: ${{ steps.set-outputs.outputs.repo_name }}
    steps:
      - name: Set activation outputs
        id: set-outputs
        run: |
          echo "issue_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          echo "repo_owner=${{ github.repository_owner }}" >> "$GITHUB_OUTPUT"
          echo "repo_name=${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"

  agent:
    needs: activation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Gather issue context and generate summary
        id: analyze
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue || {};
            const title = issue.title || "(no title)";
            const body = issue.body || "(no body)";

            // Lightweight, deterministic "analysis" that you can replace with real AI later.
            // Create a short excerpt and a simple checklist of things to check.
            const excerpt = body.split("\n").slice(0, 10).join("\n").slice(0, 1200);
            const lines = [];
            lines.push("**AI Triage Summary**");
            lines.push("");
            lines.push(`**Title:** ${title}`);
            lines.push("");
            lines.push("**Excerpt:**");
            lines.push(excerpt || "(empty)");
            lines.push("");
            lines.push("**Quick checks:**");
            lines.push("- Has reproduction steps? " + (body.match(/(steps to reproduce|repro|reproduce)/i) ? "Yes" : "No"));
            lines.push("- Mentions hardware or board? " + (body.match(/(board|hardware|pin|gpio|i2c|spi|uart)/i) ? "Yes" : "No"));
            lines.push("- Looks like a bug report or feature request? " + (body.length > 200 ? "Likely bug/long report" : "Short / unclear"));
            lines.push("");
            lines.push("*This comment was generated automatically by the repository triage workflow.*");

            const summary = lines.join("\n");
            core.setOutput("summary", summary);

      - name: Post triage comment
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ steps.analyze.outputs.summary }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });

      - name: Add triaged label
        uses: actions/github-script@v7
        with:
          script: |
            // Add a label to mark this issue as triaged. If the label doesn't exist, this call will still succeed.
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['triaged']
            });

      - name: Final status comment (noop if already commented)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            // Add a short final note so it's obvious the workflow completed.
            const final = "Triage workflow completed successfully.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: final
            });
