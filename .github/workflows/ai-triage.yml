# Incompleted, still working on it.

name: Triage

on:
  issues:
    types:
      - labeled

# Prevent concurrent runs for the same issue
concurrency:
  group: "triage-${{ github.workflow }}-${{ github.event.issue.number }}"
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

run-name: "Triage"

